version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: agentforge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forgepass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
